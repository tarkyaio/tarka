name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  # ── Job 1: Preflight checks ────────────────────────────────────────
  preflight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6.0.2

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject.toml version matches tag
        run: |
          PYPROJECT_VERSION=$(grep -Po '(?<=^version = ")[^"]+' pyproject.toml)
          if [ "$PYPROJECT_VERSION" != "${{ steps.meta.outputs.version }}" ]; then
            echo "::error::pyproject.toml version ($PYPROJECT_VERSION) does not match tag (${{ steps.meta.outputs.version }})"
            exit 1
          fi
          echo "pyproject.toml version matches tag: $PYPROJECT_VERSION"

      - name: Warn if ui/package.json version is out of sync
        run: |
          UI_VERSION=$(jq -r '.version' ui/package.json)
          if [ "$UI_VERSION" != "${{ steps.meta.outputs.version }}" ]; then
            echo "::warning::ui/package.json version ($UI_VERSION) does not match tag (${{ steps.meta.outputs.version }})"
          else
            echo "ui/package.json version matches tag: $UI_VERSION"
          fi

  # ── Job 2: Build & push images (matrix) ────────────────────────────
  build:
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tarka
            image: ghcr.io/tarkyaio/tarka
            dockerfile: ./Dockerfile
            context: .
            target: final
            build_args: ""
            tag_suffix: ""

          - name: tarka-all-providers
            image: ghcr.io/tarkyaio/tarka
            dockerfile: ./Dockerfile
            context: .
            target: final
            build_args: "POETRY_EXTRAS=all-providers"
            tag_suffix: "-all-providers"

          - name: tarka-git
            image: ghcr.io/tarkyaio/tarka
            dockerfile: ./Dockerfile
            context: .
            target: git
            build_args: ""
            tag_suffix: "-git"

          - name: tarka-all-providers-git
            image: ghcr.io/tarkyaio/tarka
            dockerfile: ./Dockerfile
            context: .
            target: git
            build_args: "POETRY_EXTRAS=all-providers"
            tag_suffix: "-all-providers-git"

          - name: tarka-ui
            image: ghcr.io/tarkyaio/tarka-ui
            dockerfile: ./ui/Dockerfile
            context: ./ui
            target: ""
            build_args: ""
            tag_suffix: ""

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: docker-meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v6.0.0
        with:
          images: ${{ matrix.image }}
          flavor: |
            suffix=${{ matrix.tag_suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v7.0.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target || '' }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # ── Job 3: Package, sign & push Helm chart (OCI) ────────────────────
  helm:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde # v2.9.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v5.0.0
        with:
          version: v4.1.3

      - name: Import GPG key
        id: gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          printf '%s' "$GPG_PASSPHRASE" > /tmp/passphrase.txt
          chmod 600 /tmp/passphrase.txt

          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

          KEY_NAME=$(gpg --list-secret-keys --with-colons 2>/dev/null | awk -F: '/^uid/{print $10; exit}')
          echo "key-name=${KEY_NAME}" >> "$GITHUB_OUTPUT"

          gpg --batch --pinentry-mode loopback --passphrase-file /tmp/passphrase.txt \
            --export-secret-keys --output /tmp/keyring.gpg
          chmod 600 /tmp/keyring.gpg

      - name: Log in to GHCR (OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set chart version to match release
        run: python3 scripts/stamp-chart-version.py "${{ needs.preflight.outputs.version }}"

      - name: Build subchart dependencies
        run: |
          helm repo add nats https://nats-io.github.io/k8s/helm/charts/
          helm dependency build deploy/chart/

      - name: Package and sign chart
        run: |
          helm package deploy/chart/ \
            --destination /tmp/helm-packages \
            --sign \
            --key "${{ steps.gpg.outputs.key-name }}" \
            --keyring /tmp/keyring.gpg \
            --passphrase-file /tmp/passphrase.txt

      - name: Push chart to GHCR
        id: push
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          OUTPUT=$(helm push "/tmp/helm-packages/tarka-${VERSION}.tgz" oci://ghcr.io/tarkyaio/charts 2>&1)
          echo "$OUTPUT"
          DIGEST=$(echo "$OUTPUT" | grep -oP 'sha256:[a-f0-9]+')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (Docker)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign chart with cosign (keyless)
        run: |
          cosign sign --yes \
            "ghcr.io/tarkyaio/charts/tarka@${{ steps.push.outputs.digest }}"

      - name: Verify cosign signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/tarkyaio/tarka/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "ghcr.io/tarkyaio/charts/tarka@${{ steps.push.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/tarkyaio/charts/tarka
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Clean up secrets
        if: always()
        run: |
          rm -f /tmp/keyring.gpg /tmp/passphrase.txt
          gpgconf --kill gpg-agent || true

  # ── Job 4: Create GitHub Release ────────────────────────────────────
  release:
    needs: [preflight, build, helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v6.0.2

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          # Extract the section for this version (between its heading and the next heading)
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, ver)) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)

          # Append Docker pull instructions
          {
            echo "$NOTES"
            echo ""
            echo "---"
            echo ""
            echo "### Docker images"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/tarkyaio/tarka:${VERSION}"
            echo "docker pull ghcr.io/tarkyaio/tarka:${VERSION}-all-providers"
            echo "docker pull ghcr.io/tarkyaio/tarka:${VERSION}-git                 # GITHUB_EVIDENCE_ENABLED=true"
            echo "docker pull ghcr.io/tarkyaio/tarka:${VERSION}-all-providers-git   # all providers + git"
            echo "docker pull ghcr.io/tarkyaio/tarka-ui:${VERSION}"
            echo '```'
            echo ""
            echo "### Helm chart"
            echo ""
            echo '```bash'
            echo "helm install tarka oci://ghcr.io/tarkyaio/charts/tarka --version ${VERSION}"
            echo '```'
          } > /tmp/release-notes.md

      - name: Determine prerelease
        id: prerelease
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          if echo "$VERSION" | grep -q '-'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: Tarka ${{ needs.preflight.outputs.tag }}
          body_path: /tmp/release-notes.md
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
