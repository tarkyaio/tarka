# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/v1.32.13/deployment-apps-v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tarka.webhook.fullname" . }}
  labels:
    {{- include "tarka.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  {{- if not .Values.webhook.autoscaling.enabled }}
  replicas: {{ .Values.webhook.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tarka.webhook.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configMap.yaml") . | sha256sum }}
        {{- with .Values.webhook.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "tarka.webhook.selectorLabels" . | nindent 8 }}
        {{- with .Values.webhook.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "tarka.serviceAccountName" . }}
      {{- with .Values.webhook.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tarka
          image: "{{ .Values.image.repository }}:{{ include "tarka.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "main.py"]
          args: ["--serve-webhook", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "tarka.configMapName" . }}
          env:
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "tarka.configMapName" . }}
                  key: AWS_REGION
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "tarka.configMapName" . }}
                  key: AWS_REGION
            - name: CONSOLE_AUTH_MODE
              value: {{ .Values.webhook.consoleAuthMode | quote }}
            - name: JETSTREAM_DUPLICATE_WINDOW_SECONDS
              value: "3600"
            {{- include "tarka.secretEnvVars" . | nindent 12 }}
            {{- with .Values.webhook.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.webhook.resources | nindent 12 }}
          {{- with .Values.webhook.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.webhook.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.webhook.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- include "tarka.sharedVolumeMounts" . | nindent 12 }}
            {{- with .Values.webhook.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.webhook.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      initContainers:
        - name: db-migrate
          image: "{{ .Values.image.repository }}:{{ include "tarka.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "agent.memory.migrate"]
          envFrom:
            - configMapRef:
                name: {{ include "tarka.configMapName" . }}
          env:
            {{- include "tarka.secretEnvVars" . | nindent 12 }}
          {{- with .Values.webhook.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.webhook.extraInitContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        {{- include "tarka.sharedVolumes" . | nindent 8 }}
        {{- with .Values.webhook.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.webhook.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhook.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhook.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
