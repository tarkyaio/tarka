{{- if and (eq .Values.secrets.provider "external") (not .Values.secrets.existingSecret) }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "tarka.fullname" . }}
  labels:
    {{- include "tarka.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ include "tarka.fullname" . }}
    kind: SecretStore
  target:
    name: {{ include "tarka.secretName" . }}
    creationPolicy: Owner
  data:
    {{- if eq .Values.secrets.externalSecrets.backendType "SecretsManager" }}
    {{- range $key, $value := .Values.secrets.data }}
    {{- if $value }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ $.Values.secrets.externalSecrets.remoteSecretName }}
        property: {{ $value }}
    {{- end }}
    {{- end }}
    {{- else }}
    {{- /* ParameterStore: each value is the full parameter path */}}
    {{- range $key, $value := .Values.secrets.data }}
    {{- if $value }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ $value }}
    {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
