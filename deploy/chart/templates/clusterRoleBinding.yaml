{{- if .Values.rbac.create -}}
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/v1.32.13/clusterrolebinding.json
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tarka.fullname" . }}-readonly
  labels:
    {{- include "tarka.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "tarka.fullname" . }}-readonly
subjects:
  - kind: ServiceAccount
    name: {{ include "tarka.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
