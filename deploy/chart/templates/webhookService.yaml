# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/v1.32.13/service-v1.json
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarka.webhook.fullname" . }}
  labels:
    {{- include "tarka.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  type: {{ .Values.webhook.service.type }}
  selector:
    {{- include "tarka.webhook.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.webhook.service.port }}
      targetPort: http
      protocol: TCP
